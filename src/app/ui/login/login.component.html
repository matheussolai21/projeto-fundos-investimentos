<app-header></app-header>

<main class="main-content">
  <section class="container-principal">
    <section class="container-form-field">
      
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        
        <!-- Campo USUÁRIO -->
        <mat-form-field appearance="outline" floatLabel="always" class="full-width">
          <mat-label>Usuário</mat-label>
          <input 
            matInput 
            type="text"
            formControlName="username"
            class="example-right-align" 
            placeholder="Digite seu usuário"
            autocomplete="username"
          />
          
          @if (loginForm.get('username')?.hasError('required') && loginForm.get('username')?.touched) {
            <mat-error>Usuário é obrigatório</mat-error>
          }
        </mat-form-field>

        <!-- Campo SENHA -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Senha</mat-label>
          <input 
            matInput 
            [type]="hide() ? 'password' : 'text'"
            formControlName="password"
            placeholder="Digite sua senha"
            autocomplete="current-password"
          />
          <button
            matIconButton
            matSuffix
            type="button"
            (click)="clickEvent($event)"
            [attr.aria-label]="'Hide password'"
            [attr.aria-pressed]="hide()"
          >
            <mat-icon>{{hide() ? 'visibility_off' : 'visibility'}}</mat-icon>
          </button>
          
          @if (loginForm.get('password')?.hasError('required') && loginForm.get('password')?.touched) {
            <mat-error>Senha é obrigatória</mat-error>
          }
        </mat-form-field>

        <!-- Botões -->
        <section class="form-actions">
          <button 
            mat-button 
            type="button" 
            (click)="limparFormulario()"
            [disabled]="loading()"
          >
            Limpar
          </button>
          <button 
            mat-raised-button 
            color="primary" 
            type="submit" 
            [disabled]="loginForm.invalid || loading()"
          >
            @if (loading()) {
              <mat-spinner diameter="20"></mat-spinner>
            }
            {{ loading() ? 'Entrando...' : 'Entrar' }}
          </button>
        </section>

        <!-- Link para registro -->
        <section class="register-link">
          <span>Não tem uma conta?</span>
          <a mat-button color="primary" routerLink="/register">Cadastre-se</a>
        </section>

      </form>
      
    </section>
  </section>
</main>

<app-footer></app-footer>
